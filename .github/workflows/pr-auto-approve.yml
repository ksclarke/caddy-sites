name: PR Auto-Approver

on:
  pull_request:
    branches:
      - main

jobs:
  approve-pr:
    name: PR Auto-Approver
    runs-on: ubuntu-latest
    env:
      AUTO_PR_APPROVAL: ${{ secrets.AUTO_PR_APPROVAL }}
    steps:
    - uses: hmarr/auto-approve-action@v4.0.0
      if: env.AUTO_PR_APPROVAL != null
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
