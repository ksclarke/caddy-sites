name: Site Deployment

on:
  workflow_dispatch:
  push:
    tags: [ '*' ]

jobs:
  deploy:
    name: Deploy Sites
    runs-on: ubuntu-latest

    env:
      SSH_AUTH_SOCK: /tmp/weblog-ssh-agent.sock

    steps:
      - name: Start SSH agent and unlock weblog deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_KEY_PASSPHRASE }}
        shell: bash
        run: |
          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null

          cat > "$RUNNER_TEMP/ssh-askpass" <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$SSH_PASSPHRASE"
          EOF
          chmod 700 "$RUNNER_TEMP/ssh-askpass"

          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' | \
            DISPLAY=none \
            SSH_ASKPASS="$RUNNER_TEMP/ssh-askpass" \
            SSH_ASKPASS_REQUIRE=force \
            ssh-add - > /dev/null

      - name: Check out source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Verify loaded SSH identity
        run: ssh-add -l

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.163.2'
          extended: true

      - name: Build weblog
        working-directory: weblog
        run: hugo --minify

      - name: SCP weblog files to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          source: weblog/public/*
          target: weblog/
          strip_components: 2

      - name: SCP caddy config to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          source: Caddyfile
          target: caddy/

      - name: SCP docker-compose config to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          source: docker-compose.yml
          target: .

      - name: SSH into server and deploy the new configurations
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          envs: ARTIFACT_NAME,RELEASE_VERSION,REPO_OWNER
          script: |
            docker compose restart caddy
